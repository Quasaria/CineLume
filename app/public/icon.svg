<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <!-- C arc + play triangle centres visuellement autour de (256, 256).
       Le C est un 3/4 cercle avec ouverture a droite, le triangle remplit
       l'ouverture. Composition shiftee de +12px right par rapport au design
       original pour compenser le poids visuel du C qui est concentre a
       gauche, donnant un meilleur equilibre optique. -->
  <g transform="translate(12 0)">
    <path d="M380 145 a155 155 0 1 0 0 222" stroke="white" stroke-width="42" stroke-linecap="round" fill="none"/>
    <path d="M260 200 L380 256 L260 312 Z" fill="white"/>
  </g>
</svg>
