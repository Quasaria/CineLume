<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <!-- C arc + triangle play partagent EXACTEMENT le meme centre (256, 256).
       Le C est un arc de 270deg (ouverture a droite) centre sur (256,256).
       Le triangle a son centroid pile sur (256,256) : 2*216 + 336 = 768,
       768/3 = 256. Composition optiquement equilibree, plus de decalage. -->
  <path d="M362 150 A150 150 0 1 0 362 362" stroke="white" stroke-width="42" stroke-linecap="round" fill="none"/>
  <path d="M216 184 L336 256 L216 328 Z" fill="white" stroke="white" stroke-width="26" stroke-linejoin="round"/>
</svg>
