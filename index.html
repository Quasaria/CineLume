<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLume - L'Éclairage sur le Cinéma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        accent: { 300: '#67e8f9', 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' }, // Cyan Néon
                        surface: { 800: '#18181b', 900: '#09090b', 950: '#050505' }
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(6, 182, 212, 0.4)',
                        'glow-lg': '0 0 40px rgba(6, 182, 212, 0.6)',
                    },
                    animation: {
                        'shimmer': 'shimmer 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shimmer: { '0%, 100%': { opacity: 1 }, '50%': { opacity: .3 } }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #ffffff; overflow-x: hidden; }
        
        #dynamic-bg {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.15) saturate(1.2);
            transition: background-image 1.5s ease-in-out;
            transform: scale(1.2);
        }

        .glass-nav {
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card { animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        
        #modal-overlay { transition: opacity 0.3s ease; }
        #modal-content { transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease; }
    </style>
</head>
<body class="min-h-screen selection:bg-accent-500 selection:text-white">

    <div id="dynamic-bg"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-transparent via-surface-950/90 to-surface-950 z-[-1]"></div>

    <nav class="fixed top-0 w-full glass-nav z-40 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-400 to-blue-600 shadow-glow flex items-center justify-center transform group-hover:scale-105 transition-all">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">Cine<span class="text-transparent bg-clip-text bg-gradient-to-r from-accent-400 to-blue-500">Lume</span></h1>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-32 px-6 pb-20">
        
        <div class="mb-12 text-center md:text-left flex flex-col items-center md:items-start">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight">Sorties en <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent-400 to-blue-500">salles.</span></h2>
            <p class="text-gray-400 text-lg md:text-xl max-w-2xl font-light" id="date-subtitle">Découvrez les pépites cinématographiques de la semaine.</p>
        </div>

        <div class="glass-panel p-2 rounded-2xl inline-flex flex-col md:flex-row gap-2 mb-12 w-full md:w-auto">
            <div class="flex overflow-x-auto no-scrollbar gap-1 p-1 md:max-w-md lg:max-w-2xl" id="months-container">
                </div>
            
            <div class="hidden md:block w-px bg-white/10 my-2 mx-2"></div>
            
            <div class="flex overflow-x-auto no-scrollbar gap-2 p-1" id="weeks-container">
                </div>
        </div>

        <div id="loading" class="hidden grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 gap-y-10">
            </div>

        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 gap-y-10">
            </div>
    </main>

    <div id="movie-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 md:p-0">
        <div id="modal-overlay" class="absolute inset-0 bg-surface-950/90 backdrop-blur-md opacity-0" onclick="closeModal()"></div>
        
        <div id="modal-content" class="relative w-full max-w-4xl bg-surface-900 rounded-3xl overflow-hidden shadow-2xl scale-95 opacity-0 flex flex-col max-h-[90vh] md:max-h-[85vh] border border-white/10">
            
            <div class="relative h-48 md:h-72 w-full shrink-0">
                <img id="modal-backdrop" src="" alt="Fond" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-surface-900 via-surface-900/60 to-transparent"></div>
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-white/20 text-white backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center transition-all z-10">✕</button>
            </div>
            
            <div class="px-6 md:px-10 pb-10 pt-0 flex flex-col md:flex-row gap-8 relative -mt-16 md:-mt-24 overflow-y-auto no-scrollbar">
                <div class="hidden md:block w-48 shrink-0 rounded-xl overflow-hidden shadow-2xl border border-white/10">
                    <img id="modal-poster" src="" alt="Affiche" class="w-full h-full object-cover">
                </div>
                
                <div class="flex flex-col justify-end pt-4">
                    <div class="flex flex-wrap gap-2 mb-3 items-center" id="modal-genres">
                        <span class="bg-accent-500/20 text-accent-400 border border-accent-500/30 px-3 py-1 rounded-full text-xs font-bold tracking-wide uppercase" id="modal-date">Date</span>
                    </div>
                    
                    <h2 id="modal-title" class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight tracking-tight">Titre</h2>
                    
                    <div class="flex items-center gap-4 mb-6">
                        <div class="flex items-center gap-1 bg-white/5 px-3 py-1.5 rounded-lg border border-white/10">
                            <svg class="w-5 h-5 text-accent-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <span id="modal-rating" class="font-bold text-white">0.0</span>
                        </div>
                    </div>
                    
                    <p id="modal-overview" class="text-gray-300 text-base md:text-lg leading-relaxed font-light">Résumé...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '81f09aab8379105c078d67759877bc0b';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        const BACKDROP_URL = 'https://image.tmdb.org/t/p/w1280';

        const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear(); 
        let selectedMonth = currentDate.getMonth();
        let selectedWeek = Math.ceil(currentDate.getDate() / 7);
        if(selectedWeek > 4) selectedWeek = 4;

        function getDatesForWeek(year, monthIndex, weekNumber) {
            let startDay = (weekNumber - 1) * 7 + 1;
            let endDay = weekNumber * 7;
            let lastDayOfMonth = new Date(year, monthIndex + 1, 0).getDate();
            if (weekNumber === 4) endDay = lastDayOfMonth; 
            let start = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(startDay).padStart(2, '0')}`;
            let end = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`;
            return { start, end };
        }

        function formatDateFR(dateString) {
            return new Date(dateString).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function generateSkeletons() {
            const loadingContainer = document.getElementById('loading');
            loadingContainer.innerHTML = '';
            for(let i=0; i<10; i++) {
                loadingContainer.innerHTML += `
                    <div class="rounded-2xl bg-surface-800 border border-white/5 aspect-[2/3] animate-shimmer overflow-hidden relative">
                        <div class="absolute bottom-4 left-4 right-4 space-y-3">
                            <div class="h-4 bg-white/10 rounded w-3/4"></div>
                            <div class="h-3 bg-white/10 rounded w-1/2"></div>
                        </div>
                    </div>
                `;
            }
        }

        function initUI() {
            const monthsContainer = document.getElementById('months-container');
            const weeksContainer = document.getElementById('weeks-container');
            generateSkeletons();

            months.forEach((month, index) => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2.5 rounded-xl font-semibold transition-all duration-300 text-sm whitespace-nowrap ${index === selectedMonth ? 'bg-accent-500 text-white shadow-glow' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                btn.innerText = month;
                btn.onclick = () => { selectedMonth = index; selectedWeek = 1; updateUI(); };
                monthsContainer.appendChild(btn);
            });

            for(let i = 1; i <= 4; i++) {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2.5 rounded-xl font-semibold transition-all duration-300 text-sm whitespace-nowrap ${i === selectedWeek ? 'bg-white text-surface-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                btn.innerText = `Semaine ${i}`;
                btn.onclick = () => { selectedWeek = i; updateUI(); };
                weeksContainer.appendChild(btn);
            }
            updateUI();
        }

        function updateUI() {
            const monthBtns = document.getElementById('months-container').children;
            Array.from(monthBtns).forEach((btn, index) => {
                btn.className = `px-5 py-2.5 rounded-xl font-semibold transition-all duration-300 text-sm whitespace-nowrap ${index === selectedMonth ? 'bg-accent-500 text-white shadow-glow' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
            });

            const weekBtns = document.getElementById('weeks-container').children;
            Array.from(weekBtns).forEach((btn, index) => {
                btn.className = `px-5 py-2.5 rounded-xl font-semibold transition-all duration-300 text-sm whitespace-nowrap ${index + 1 === selectedWeek ? 'bg-white text-surface-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
            });

            const dates = getDatesForWeek(currentYear, selectedMonth, selectedWeek);
            document.getElementById('date-subtitle').innerText = `Sorties prévues du ${formatDateFR(dates.start)} au ${formatDateFR(dates.end)}`;
            fetchMovies(dates.start, dates.end);
        }

        async function fetchMovies(startDate, endDate) {
            const grid = document.getElementById('movie-grid');
            const loading = document.getElementById('loading');
            
            grid.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=fr-FR&region=FR&primary_release_date.gte=${startDate}&primary_release_date.lte=${endDate}&with_release_type=2|3&sort_by=popularity.desc`;
                const response = await fetch(url);
                const data = await response.json();
                
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                
                displayMovies(data.results);
                
                if(data.results && data.results.length > 0 && data.results[0].backdrop_path) {
                    document.getElementById('dynamic-bg').style.backgroundImage = `url('${BACKDROP_URL + data.results[0].backdrop_path}')`;
                }
            } catch (error) {
                loading.innerHTML = '<p class="text-red-500 col-span-full">Erreur de connexion.</p>';
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            
            if(!movies || movies.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-10 text-center text-gray-500">Aucun film trouvé pour cette semaine.</div>`;
                return;
            }

            movies.forEach((movie, index) => {
                if (!movie.poster_path) return;
                const card = document.createElement('div');
                card.className = "movie-card group relative rounded-2xl overflow-hidden cursor-pointer bg-surface-800 border border-white/5 aspect-[2/3] shadow-lg hover:shadow-2xl hover:shadow-accent-500/20 transition-all duration-500";
                card.style.animationDelay = `${index * 0.05}s`;
                card.onclick = () => openModal(movie);

                card.innerHTML = `
                    <img src="${IMG_URL + movie.poster_path}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-surface-950 via-surface-900/40 to-transparent opacity-90 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <div class="absolute inset-0 flex flex-col justify-end p-5">
                        <h3 class="text-white font-bold text-lg leading-tight mb-1 group-hover:text-accent-400 transition-colors">${movie.title}</h3>
                        <p class="text-gray-400 text-sm font-medium">${formatDateFR(movie.release_date)}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        const modal = document.getElementById('movie-modal');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');

        function openModal(movie) {
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-date').innerText = formatDateFR(movie.release_date);
            document.getElementById('modal-rating').innerText = movie.vote_average.toFixed(1);
            document.getElementById('modal-overview').innerText = movie.overview || "Le synopsis n'est pas disponible.";
            document.getElementById('modal-poster').src = IMG_URL + movie.poster_path;
            
            // Gestion du backdrop : s'il n'y en a pas, on met le poster flouté
            const backdropImg = movie.backdrop_path ? BACKDROP_URL + movie.backdrop_path : IMG_URL + movie.poster_path;
            document.getElementById('modal-backdrop').src = backdropImg;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modalOverlay.classList.remove('opacity-0');
                modalContent.classList.remove('opacity-0', 'scale-95');
            }, 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        initUI();
    </script>
</body>
</html>
