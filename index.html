<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLume - L'Éclairage sur le Cinéma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        lume: { 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' },
                        dark: { 800: '#121212', 900: '#0a0a0a' }
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(245, 158, 11, 0.3)',
                        'glow-lg': '0 0 40px rgba(245, 158, 11, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0a0a0a; color: #ffffff; overflow-x: hidden; }
        
        /* Arrière-plan dynamique flouté */
        #dynamic-bg {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.25);
            transition: background-image 1s ease-in-out;
            transform: scale(1.1); /* Evite les bords transparents dus au flou */
        }

        /* Styles Glassmorphism Premium */
        .glass-nav {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-panel {
            background: linear-gradient(145deg, rgba(25,25,25,0.6) 0%, rgba(10,10,10,0.8) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Cacher la scrollbar mais garder le scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations des cartes */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        /* Modale */
        #modal-overlay { transition: opacity 0.4s ease; }
        #modal-content { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; }
    </style>
</head>
<body class="min-h-screen selection:bg-lume-500 selection:text-white">

    <div id="dynamic-bg"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-transparent via-dark-900/80 to-dark-900 z-[-1]"></div>

    <nav class="fixed top-0 w-full glass-nav z-40 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-lume-600 to-lume-400 shadow-glow flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="text-3xl font-black tracking-tight">Cine<span class="text-transparent bg-clip-text bg-gradient-to-r from-lume-400 to-lume-600">Lume</span></h1>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-medium text-gray-300">
                <span class="hover:text-white cursor-pointer transition-colors">Accueil</span>
                <span class="text-lume-400 cursor-pointer">Sorties</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-32 px-6 pb-20">
        
        <div class="mb-10 text-center md:text-left">
            <h2 class="text-4xl md:text-5xl font-black mb-4">À l'affiche en salle.</h2>
            <p class="text-gray-400 text-lg max-w-2xl" id="date-subtitle">Découvrez les pépites cinématographiques qui sortent cette semaine.</p>
        </div>

        <div class="glass-panel p-2 rounded-3xl inline-flex flex-col md:flex-row gap-4 mb-12 shadow-2xl w-full md:w-auto">
            <div class="flex overflow-x-auto no-scrollbar gap-1 p-2 md:max-w-md lg:max-w-xl" id="months-container">
                </div>
            
            <div class="w-full md:w-px bg-white/10 my-2 md:my-0"></div>
            
            <div class="flex overflow-x-auto no-scrollbar gap-2 p-2" id="weeks-container">
                </div>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-white/10 border-t-lume-500 rounded-full animate-spin mb-4"></div>
            <p class="text-lume-400 font-medium animate-pulse">Recherche des œuvres...</p>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 gap-y-10">
            </div>

    </main>

    <div id="movie-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div id="modal-overlay" class="absolute inset-0 bg-dark-900/90 backdrop-blur-sm opacity-0" onclick="closeModal()"></div>
        
        <div id="modal-content" class="relative w-full max-w-5xl bg-dark-800 rounded-3xl overflow-hidden shadow-2xl scale-95 opacity-0 flex flex-col md:flex-row max-h-[90vh] md:max-h-[80vh] m-4 border border-white/10">
            
            <div class="w-full md:w-5/12 h-64 md:h-auto relative">
                <img id="modal-image" src="" alt="Affiche" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-dark-800 to-transparent"></div>
            </div>
            
            <div class="w-full md:w-7/12 p-8 md:p-12 overflow-y-auto flex flex-col justify-center relative">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full w-10 h-10 flex items-center justify-center transition-all">✕</button>
                
                <p id="modal-date" class="text-lume-500 font-bold tracking-widest text-sm uppercase mb-2">Date</p>
                <h2 id="modal-title" class="text-4xl md:text-5xl font-black mb-4 leading-tight">Titre</h2>
                
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex items-center bg-white/10 px-3 py-1 rounded-full">
                        <span class="text-lume-400 mr-1">★</span>
                        <span id="modal-rating" class="font-bold">0.0</span>
                    </div>
                    <span id="modal-votes" class="text-gray-400 text-sm">0 avis</span>
                </div>
                
                <h3 class="text-xl font-semibold mb-3">Synopsis</h3>
                <p id="modal-overview" class="text-gray-300 text-lg leading-relaxed mb-8">Résumé...</p>
                
                <button class="bg-gradient-to-r from-lume-600 to-lume-400 hover:from-lume-500 hover:to-lume-300 text-white font-bold py-4 px-8 rounded-full shadow-glow-lg transform hover:scale-105 transition-all w-fit">
                    Rechercher des séances
                </button>
            </div>
        </div>
    </div>

    <script>
        // Ta clé API intégrée directement
        const API_KEY = '81f09aab8379105c078d67759877bc0b';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w780'; // Haute qualité
        const BACKDROP_URL = 'https://image.tmdb.org/t/p/w1280'; // Très haute qualité

        const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
        const currentYear = new Date().getFullYear(); // On base tout sur l'année en cours (2026 selon ton contexte)
        let selectedMonth = new Date().getMonth();
        let selectedWeek = 1;

        // --- CALCULATEUR DE DATES EXACTES ---
        function getDatesForWeek(year, monthIndex, weekNumber) {
            // Semaine 1 : 1 au 7 / Semaine 2 : 8 au 14 / Semaine 3 : 15 au 21 / Semaine 4 : 22 à la fin du mois
            let startDay = (weekNumber - 1) * 7 + 1;
            let endDay = weekNumber * 7;
            let lastDayOfMonth = new Date(year, monthIndex + 1, 0).getDate();
            
            if (weekNumber === 4) endDay = lastDayOfMonth; 
            
            let start = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(startDay).padStart(2, '0')}`;
            let end = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`;
            
            return { start, end };
        }

        function formatDateFR(dateString) {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return new Date(dateString).toLocaleDateString('fr-FR', options);
        }

        // --- INITIALISATION UI ---
        function initUI() {
            const monthsContainer = document.getElementById('months-container');
            const weeksContainer = document.getElementById('weeks-container');

            // Création des Mois
            months.forEach((month, index) => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-full font-medium transition-all duration-300 text-sm whitespace-nowrap ${index === selectedMonth ? 'bg-white text-dark-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                btn.innerText = month;
                btn.onclick = () => {
                    selectedMonth = index;
                    selectedWeek = 1; // Reset à la semaine 1
                    updateUI();
                };
                monthsContainer.appendChild(btn);
            });

            // Création des Semaines (1 à 4)
            for(let i = 1; i <= 4; i++) {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-full font-medium transition-all duration-300 text-sm whitespace-nowrap ${i === selectedWeek ? 'bg-lume-500 text-white shadow-glow' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                btn.innerText = `Semaine ${i}`;
                btn.onclick = () => {
                    selectedWeek = i;
                    updateUI();
                };
                weeksContainer.appendChild(btn);
            }
            
            updateUI(); // Lancer la première recherche
        }

        function updateUI() {
            // Mettre à jour le style des boutons Mois
            const monthBtns = document.getElementById('months-container').children;
            Array.from(monthBtns).forEach((btn, index) => {
                btn.className = `px-5 py-2 rounded-full font-medium transition-all duration-300 text-sm whitespace-nowrap ${index === selectedMonth ? 'bg-white text-dark-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
            });

            // Mettre à jour le style des boutons Semaines
            const weekBtns = document.getElementById('weeks-container').children;
            Array.from(weekBtns).forEach((btn, index) => {
                btn.className = `px-5 py-2 rounded-full font-medium transition-all duration-300 text-sm whitespace-nowrap ${index + 1 === selectedWeek ? 'bg-lume-500 text-white shadow-glow' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
            });

            // Récupérer les dates exactes et lancer la recherche
            const dates = getDatesForWeek(currentYear, selectedMonth, selectedWeek);
            document.getElementById('date-subtitle').innerText = `Du ${formatDateFR(dates.start)} au ${formatDateFR(dates.end)}`;
            fetchMovies(dates.start, dates.end);
        }

        // --- FETCH API ---
        async function fetchMovies(startDate, endDate) {
            const grid = document.getElementById('movie-grid');
            const loading = document.getElementById('loading');
            
            grid.innerHTML = '';
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            try {
                // On cherche les films avec release_type 2 et 3 (Theatrical et Theatrical Limited) pour être sûr de tout avoir
                const url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=fr-FR&region=FR&primary_release_date.gte=${startDate}&primary_release_date.lte=${endDate}&with_release_type=2|3&sort_by=popularity.desc`;
                const response = await fetch(url);
                const data = await response.json();
                
                loading.classList.add('hidden');
                loading.classList.remove('flex');
                
                displayMovies(data.results);
                
                // Mettre le background avec le film le plus populaire
                if(data.results && data.results.length > 0 && data.results[0].backdrop_path) {
                    document.getElementById('dynamic-bg').style.backgroundImage = `url('${BACKDROP_URL + data.results[0].backdrop_path}')`;
                }

            } catch (error) {
                console.error("Erreur:", error);
                loading.innerHTML = '<p class="text-red-500 font-bold">Erreur de connexion aux serveurs.</p>';
            }
        }

        // --- AFFICHAGE ---
        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            
            if(!movies || movies.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center glass-panel rounded-3xl">
                        <span class="text-6xl mb-4 block">🎞️</span>
                        <h3 class="text-2xl font-bold mb-2">Aucune sortie majeure</h3>
                        <p class="text-gray-400">Il semble n'y avoir aucune sortie enregistrée pour cette semaine précise en France.</p>
                    </div>`;
                return;
            }

            movies.forEach((movie, index) => {
                if (!movie.poster_path) return;

                const card = document.createElement('div');
                card.className = "movie-card group relative rounded-2xl overflow-hidden cursor-pointer bg-dark-800 border border-white/5 aspect-[2/3]";
                card.style.animationDelay = `${index * 0.05}s`; // Effet cascade
                
                card.onclick = () => openModal(movie);

                card.innerHTML = `
                    <img src="${IMG_URL + movie.poster_path}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-80 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <div class="absolute inset-0 flex flex-col justify-end p-5 translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                        <div class="flex items-center gap-2 mb-2 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">
                            <span class="text-lume-400 text-xs font-bold">★ ${movie.vote_average.toFixed(1)}</span>
                        </div>
                        <h3 class="text-white font-bold text-lg md:text-xl leading-tight drop-shadow-md">${movie.title}</h3>
                        <p class="text-gray-300 text-sm mt-1 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-200">${formatDateFR(movie.release_date)}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- MODALE ---
        const modal = document.getElementById('movie-modal');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');

        function openModal(movie) {
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-date').innerText = "Sortie le " + formatDateFR(movie.release_date);
            document.getElementById('modal-rating').innerText = movie.vote_average.toFixed(1);
            document.getElementById('modal-votes').innerText = `(${movie.vote_count} avis)`;
            document.getElementById('modal-overview').innerText = movie.overview || "Le synopsis de ce film n'est pas encore disponible en français.";
            document.getElementById('modal-image').src = IMG_URL + movie.poster_path;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Animation d'entrée
            setTimeout(() => {
                modalOverlay.classList.remove('opacity-0');
                modalContent.classList.remove('opacity-0', 'scale-95');
            }, 10);
            
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            // Animation de sortie
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.add('opacity-0', 'scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }, 400); // Attend la fin de la transition CSS
        }

        // Démarrage
        initUI();
    </script>
</body>
</html>
