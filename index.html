<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinéSorties - Nouveautés Cinéma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F0F0F; color: #ffffff; }
        /* Effet Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-modal { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); }
        /* Cacher la barre de défilement pour les mois */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen relative">

    <header class="fixed top-0 w-full glass z-40 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tight">Ciné<span class="text-purple-500">Sorties</span></h1>
            <p class="text-sm text-gray-400 hidden md:block">Les sorties salles en France</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto pt-24 px-6 pb-12">
        
        <section class="mb-10">
            <div class="flex overflow-x-auto hide-scrollbar gap-3 mb-6 pb-2" id="months-container">
                </div>
            
            <div class="flex flex-wrap gap-3" id="weeks-container">
                <button class="px-6 py-2 rounded-full glass hover:bg-purple-600/50 transition-colors">Semaine 1</button>
                <button class="px-6 py-2 rounded-full glass hover:bg-purple-600/50 transition-colors">Semaine 2</button>
                <button class="px-6 py-2 rounded-full glass hover:bg-purple-600/50 transition-colors">Semaine 3</button>
                <button class="px-6 py-2 rounded-full glass hover:bg-purple-600/50 transition-colors">Semaine 4</button>
            </div>

            <p id="date-status" class="mt-4 text-purple-400 text-sm font-semibold">
                Sélectionnez un mois et une semaine pour voir les films.
            </p>
        </section>

        <div id="loading" class="hidden text-center text-gray-400 py-10">Recherche des films en cours...</div>
        
        <section id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            </section>
    </main>

    <div id="movie-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 transition-opacity" onclick="closeModal()"></div>
        
        <div class="glass-modal relative w-full max-w-3xl rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row transform transition-transform">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center z-10 transition-colors">✕</button>
            
            <img id="modal-poster" src="" alt="Affiche" class="w-full md:w-1/3 object-cover">
            
            <div class="p-8 w-full md:w-2/3 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl font-bold mb-2">Titre du film</h2>
                <p id="modal-date" class="text-purple-400 text-sm mb-4">Date de sortie</p>
                <div class="flex items-center gap-2 mb-6">
                    <span class="bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded text-sm font-bold" id="modal-rating">★ 0.0</span>
                </div>
                <h3 class="text-lg font-semibold mb-2">Synopsis</h3>
                <p id="modal-overview" class="text-gray-300 text-sm leading-relaxed max-h-48 overflow-y-auto">
                    Résumé du film...
                </p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        // ATTENTION : Remplace la ligne ci-dessous par ta vraie clé API TMDB
        const API_KEY = 'TA_CLE_API_ICI'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
        let currentMonth = new Date().getMonth();

        // --- 2. INITIALISATION DE L'INTERFACE ---
        function initUI() {
            const monthsContainer = document.getElementById('months-container');
            months.forEach((month, index) => {
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 rounded-full border border-white/10 whitespace-nowrap transition-all ${index === currentMonth ? 'bg-purple-600 text-white shadow-[0_0_15px_rgba(147,51,234,0.5)]' : 'glass text-gray-300 hover:text-white hover:bg-white/10'}`;
                btn.innerText = month;
                // Pour la démo, cliquer sur un mois relance une recherche fictive
                btn.onclick = () => {
                    document.querySelectorAll('#months-container button').forEach(b => {
                        b.classList.remove('bg-purple-600', 'text-white', 'shadow-[0_0_15px_rgba(147,51,234,0.5)]');
                        b.classList.add('glass', 'text-gray-300');
                    });
                    btn.classList.add('bg-purple-600', 'text-white', 'shadow-[0_0_15px_rgba(147,51,234,0.5)]');
                    btn.classList.remove('glass', 'text-gray-300');
                    fetchMovies('2026-05-06', '2026-05-12'); // Dates fixes pour la démo
                };
                monthsContainer.appendChild(btn);
            });
            
            // Lancer la première recherche
            fetchMovies('2026-05-01', '2026-05-31'); 
        }

        // --- 3. CONNEXION À L'API ---
        async function fetchMovies(startDate, endDate) {
            if (API_KEY === '81f09aab8379105c078d67759877bc0b') {
                document.getElementById('movie-grid').innerHTML = '<p class="text-red-400 col-span-full text-center">Erreur : Tu dois insérer ta clé API TMDB dans le code (ligne 87) pour voir les films !</p>';
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('movie-grid').innerHTML = '';
            document.getElementById('date-status').innerText = `Sorties prévues du ${startDate} au ${endDate}`;

            try {
                // Requête à TMDB : Films sortant au ciné (with_release_type=3) en France (region=FR)
                const response = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&language=fr-FR&region=FR&primary_release_date.gte=${startDate}&primary_release_date.lte=${endDate}&with_release_type=3&sort_by=popularity.desc`);
                const data = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                displayMovies(data.results);
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('loading').innerText = "Erreur de chargement des films.";
            }
        }

        // --- 4. AFFICHAGE DES FILMS ---
        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            if(movies.length === 0) {
                grid.innerHTML = '<p class="text-gray-400 col-span-full text-center">Aucun film trouvé pour cette période.</p>';
                return;
            }

            movies.forEach(movie => {
                if (!movie.poster_path) return; // Ignorer si pas d'affiche

                const card = document.createElement('div');
                card.className = "group relative rounded-xl overflow-hidden cursor-pointer shadow-lg transition-transform duration-300 hover:scale-105 border border-white/5";
                
                // On attache les données du film à la carte pour la modale
                card.onclick = () => openModal(movie);

                card.innerHTML = `
                    <img src="${IMG_URL + movie.poster_path}" alt="${movie.title}" class="w-full h-full object-cover aspect-[2/3] transition-all duration-300 group-hover:brightness-50">
                    <div class="absolute inset-0 flex flex-col justify-end p-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-gradient-to-t from-black/90 via-black/50 to-transparent">
                        <h3 class="text-white font-bold text-sm md:text-base leading-tight">${movie.title}</h3>
                        <p class="text-purple-400 text-xs mt-1 font-semibold">${movie.release_date}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- 5. GESTION DE LA MODALE ---
        function openModal(movie) {
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-date').innerText = "Sortie : " + movie.release_date;
            document.getElementById('modal-rating').innerText = "★ " + movie.vote_average.toFixed(1);
            document.getElementById('modal-overview').innerText = movie.overview || "Aucun synopsis disponible pour ce film.";
            document.getElementById('modal-poster').src = IMG_URL + movie.poster_path;
            
            const modal = document.getElementById('movie-modal');
            modal.classList.remove('hidden');
            // Empêcher le scroll du site derrière la modale
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('movie-modal').classList.add('hidden');
            document.body.style.overflow = 'auto'; // Réactiver le scroll
        }

        // Lancer l'initialisation au chargement
        initUI();
    </script>
</body>
</html>
