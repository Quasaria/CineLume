<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CineLume – Découvrez les sorties cinéma de la semaine avec une interface Aurora élégante.">
    <title>CineLume – L'Éclairage sur le Cinéma</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' },
                        violet: { 500: '#a855f7', 600: '#7c3aed', 900: '#4c1d95' },
                        surface: { 800: '#18181b', 900: '#09090b', 950: '#050505' }
                    },
                    boxShadow: {
                        'glow-cyan': '0 0 20px rgba(34, 211, 238, 0.4)',
                        'glow-violet': '0 0 30px rgba(124, 58, 237, 0.5)',
                    },
                    animation: {
                        'shimmer': 'shimmer 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shimmer: { '0%, 100%': { opacity: 1 }, '50%': { opacity: .3 } }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        main { flex-grow: 1; }
        
        #dynamic-bg {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.2) saturate(1.3);
            transition: background-image 2s ease-in-out;
            transform: scale(1.1);
        }
        #dynamic-bg::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at top right, rgba(124, 58, 237, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at bottom left, rgba(34, 211, 238, 0.1) 0%, transparent 60%);
            z-index: -1;
        }

        .glass-nav {
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .scroll-mask {
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card {
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
        }

        #modal-overlay { transition: opacity 0.4s ease; }
        #modal-content { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s ease; }
        
        .text-aurora {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(to right, #a855f7, #22d3ee);
        }
        
        /* Spinner pour le chargement des détails */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #22d3ee;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="selection:bg-violet-500 selection:text-white">

    <div id="dynamic-bg"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-transparent via-surface-950/80 to-surface-950 z-[-1]"></div>

    <script>
        (function() {
            // === CONFIG ===
            const DEFAULT_API_KEY = '81f09aab8379105c078d67759877bc0b';
            const BASE_URL = 'https://api.themoviedb.org/3';
            const IMG_URL = 'https://image.tmdb.org/t/p/w500';
            const PROFILE_URL = 'https://image.tmdb.org/t/p/w185';
            const BACKDROP_URL = 'https://image.tmdb.org/t/p/w1280';
            const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
            
            let apiKey = localStorage.getItem('tmdb_api_key') || DEFAULT_API_KEY;
            const today = new Date();
            let selectedMonth = today.getMonth();
            let selectedWeek = Math.min(4, Math.ceil(today.getDate() / 7));
            let selectedYear = today.getFullYear();
            const minYear = today.getFullYear() - 1;
            const maxYear = today.getFullYear() + 2;

            // === UI ELEMENTS ===
            const gridEl = document.getElementById('movie-grid');
            const loadingEl = document.getElementById('loading');
            const dynamicBg = document.getElementById('dynamic-bg');
            const modal = document.getElementById('movie-modal');

            // === UTILS ===
            function getDatesForWeek(year, monthIndex, weekNumber) {
                const startDay = (weekNumber - 1) * 7 + 1;
                let endDay = weekNumber * 7;
                const lastDayOfMonth = new Date(year, monthIndex + 1, 0).getDate();
                if (weekNumber === 4) endDay = lastDayOfMonth;
                return { 
                    start: `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(startDay).padStart(2, '0')}`,
                    end: `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`
                };
            }
            function formatDateFR(dateString) {
                return new Date(dateString).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            }

            // === INIT UI ===
            function buildUI() {
                const mContainer = document.getElementById('months-container');
                mContainer.innerHTML = '';
                months.forEach((month, i) => {
                    const btn = document.createElement('button');
                    btn.className = `px-5 py-2 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap`;
                    btn.textContent = month;
                    btn.onclick = () => { selectedMonth = i; selectedWeek = 1; updateUI(); };
                    mContainer.appendChild(btn);
                });

                const wContainer = document.getElementById('weeks-container');
                wContainer.innerHTML = '';
                for (let i = 1; i <= 4; i++) {
                    const btn = document.createElement('button');
                    btn.className = `px-5 py-2 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap`;
                    btn.textContent = `Semaine ${i}`;
                    btn.onclick = () => { selectedWeek = i; updateUI(); };
                    wContainer.appendChild(btn);
                }
            }

            function updateUI() {
                document.getElementById('current-year-display').textContent = selectedYear;
                Array.from(document.getElementById('months-container').children).forEach((btn, i) => {
                    btn.className = `px-5 py-2.5 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap ${i === selectedMonth ? 'bg-gradient-to-r from-violet-600 to-cyan-500 text-white shadow-glow-violet' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                });
                Array.from(document.getElementById('weeks-container').children).forEach((btn, i) => {
                    btn.className = `px-5 py-2.5 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap ${i + 1 === selectedWeek ? 'bg-white text-surface-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                });

                const dates = getDatesForWeek(selectedYear, selectedMonth, selectedWeek);
                document.getElementById('date-subtitle').textContent = `Du ${formatDateFR(dates.start)} au ${formatDateFR(dates.end)}`;
                fetchMovies(dates.start, dates.end);
            }

            // === FETCH GRILLE (Liste légère) ===
            async function fetchMovies(startDate, endDate) {
                gridEl.classList.add('hidden');
                loadingEl.innerHTML = Array(10).fill(`<div class="rounded-2xl bg-surface-800 border border-white/5 aspect-[2/3] animate-shimmer"></div>`).join('');
                loadingEl.classList.remove('hidden');

                try {
                    const url = `${BASE_URL}/discover/movie?api_key=${apiKey}&language=fr-FR&region=FR&primary_release_date.gte=${startDate}&primary_release_date.lte=${endDate}&with_release_type=2|3&sort_by=popularity.desc`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    loadingEl.classList.add('hidden');
                    gridEl.classList.remove('hidden');
                    
                    if (data.results && data.results.length > 0) {
                        displayMovies(data.results);
                        if (data.results[0].backdrop_path) dynamicBg.style.backgroundImage = `url('${BACKDROP_URL}${data.results[0].backdrop_path}')`;
                    } else {
                        gridEl.innerHTML = `<div class="col-span-full py-16 text-center text-gray-500 text-lg">Aucune sortie pour cette période.</div>`;
                    }
                } catch (e) {
                    loadingEl.classList.add('hidden');
                    gridEl.classList.remove('hidden');
                    gridEl.innerHTML = `<div class="col-span-full py-16 text-center text-red-400">Erreur de chargement.</div>`;
                }
            }

            function handleTilt(e, card) {
                const rect = card.getBoundingClientRect();
                const rotateX = (((e.clientY - rect.top) - rect.height / 2) / (rect.height / 2)) * -12; 
                const rotateY = (((e.clientX - rect.left) - rect.width / 2) / (rect.width / 2)) * 12;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
            }

            function displayMovies(movies) {
                gridEl.innerHTML = '';
                movies.forEach((movie, index) => {
                    if (!movie.poster_path) return;
                    const card = document.createElement('div');
                    card.className = "movie-card group relative rounded-2xl overflow-hidden cursor-pointer bg-surface-800 border border-white/10 aspect-[2/3] shadow-lg";
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    if(window.matchMedia("(min-width: 768px)").matches) {
                        card.addEventListener('mousemove', (e) => handleTilt(e, card));
                        card.addEventListener('mouseleave', () => card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`);
                    }
                    
                    card.onclick = () => openModal(movie);
                    const rating = movie.vote_average > 0 ? `<div class="absolute top-3 right-3 bg-surface-900/80 backdrop-blur-md border border-white/10 text-white text-xs font-bold px-2 py-1 rounded-lg flex items-center gap-1 z-10"><span class="text-cyan-400">★</span>${movie.vote_average.toFixed(1)}</div>` : '';

                    card.innerHTML = `
                        ${rating}
                        <img src="${IMG_URL}${movie.poster_path}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-surface-950 via-surface-900/50 to-transparent opacity-90 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="absolute inset-0 flex flex-col justify-end p-4 md:p-5">
                            <h3 class="text-white font-extrabold text-lg leading-tight mb-1 group-hover:text-cyan-400">${movie.title}</h3>
                            <p class="text-violet-300 text-xs font-bold uppercase tracking-wider">${formatDateFR(movie.release_date)}</p>
                        </div>
                    `;
                    gridEl.appendChild(card);
                });
            }

            // === FETCH DETAILS (Infos Profondes) ===
            async function fetchMovieDetails(movieId) {
                document.getElementById('modal-cast-loading').style.display = 'flex';
                document.getElementById('modal-cast').innerHTML = '';
                document.getElementById('modal-runtime').classList.add('hidden');
                document.getElementById('modal-genres').innerHTML = '';
                document.getElementById('modal-director').textContent = '';
                document.getElementById('modal-trailer-btn').classList.add('hidden');

                try {
                    const res = await fetch(`${BASE_URL}/movie/${movieId}?api_key=${apiKey}&language=fr-FR&append_to_response=credits,videos`);
                    const data = await res.json();

                    // Durée
                    if (data.runtime) {
                        const h = Math.floor(data.runtime / 60);
                        const m = data.runtime % 60;
                        const runtimeEl = document.getElementById('modal-runtime');
                        runtimeEl.textContent = `${h}h ${m < 10 ? '0'+m : m}m`;
                        runtimeEl.classList.remove('hidden');
                    }

                    // Genres
                    if (data.genres) {
                        document.getElementById('modal-genres').innerHTML = data.genres.slice(0,3).map(g => `<span>${g.name}</span>`).join('<span class="text-white/20">•</span>');
                    }

                    // Réalisateur
                    if (data.credits && data.credits.crew) {
                        const director = data.credits.crew.find(c => c.job === 'Director');
                        if (director) document.getElementById('modal-director').innerHTML = `Un film de <span class="text-white">${director.name}</span>`;
                    }

                    // Bande-annonce (YouTube)
                    if (data.videos && data.videos.results) {
                        const trailer = data.videos.results.find(v => v.site === 'YouTube' && v.type === 'Trailer') || data.videos.results.find(v => v.site === 'YouTube');
                        if (trailer) {
                            const btn = document.getElementById('modal-trailer-btn');
                            btn.href = `https://www.youtube.com/watch?v=${trailer.key}`;
                            btn.classList.remove('hidden');
                        }
                    }

                    // Casting
                    document.getElementById('modal-cast-loading').style.display = 'none';
                    if (data.credits && data.credits.cast && data.credits.cast.length > 0) {
                        const castHtml = data.credits.cast.slice(0, 8).map(actor => {
                            const imgPath = actor.profile_path ? `${PROFILE_URL}${actor.profile_path}` : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="150"><rect fill="%2318181b" width="100" height="150"/><path fill="%23ffffff30" d="M50 30c-11 0-20 9-20 20s9 20 20 20 20-9 20-20-9-20-20-20zm0 45c-15.5 0-40 7.8-40 23.3v11.7h80v-11.7c0-15.5-24.5-23.3-40-23.3z"/></svg>';
                            return `
                                <div class="flex flex-col items-center min-w-[80px] shrink-0">
                                    <div class="w-16 h-16 rounded-full overflow-hidden mb-2 border-2 border-white/10">
                                        <img src="${imgPath}" alt="${actor.name}" class="w-full h-full object-cover">
                                    </div>
                                    <span class="text-xs text-white font-bold text-center leading-tight">${actor.name}</span>
                                    <span class="text-[10px] text-gray-500 text-center leading-tight mt-1 line-clamp-1">${actor.character}</span>
                                </div>
                            `;
                        }).join('');
                        document.getElementById('modal-cast').innerHTML = castHtml;
                    } else {
                        document.getElementById('modal-cast').innerHTML = `<p class="text-sm text-gray-500">Casting non renseigné.</p>`;
                    }
                } catch (e) {
                    document.getElementById('modal-cast-loading').innerHTML = "Erreur lors du chargement des détails.";
                }
            }

            // === GESTION MODALE ===
            function openModal(movie) {
                // Remplissage infos de base immédiates
                document.getElementById('modal-title').textContent = movie.title;
                document.getElementById('modal-date').textContent = formatDateFR(movie.release_date);
                document.getElementById('modal-rating').textContent = movie.vote_average > 0 ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('modal-overview').textContent = movie.overview || "Synopsis indisponible pour le moment.";
                document.getElementById('modal-poster').src = `${IMG_URL}${movie.poster_path}`;
                
                const backdrop = document.getElementById('modal-backdrop');
                if (movie.backdrop_path) {
                    backdrop.src = `${BACKDROP_URL}${movie.backdrop_path}`;
                    backdrop.style.display = '';
                } else {
                    backdrop.style.display = 'none';
                }

                // Affichage Modale
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        document.getElementById('modal-overlay').classList.remove('opacity-0');
                        document.getElementById('modal-content').classList.remove('opacity-0', 'translate-y-full', 'md:translate-y-0', 'md:scale-95');
                    });
                });

                // Lancement requête secondaire profonde
                fetchMovieDetails(movie.id);
            }

            window.closeModal = function() {
                document.getElementById('modal-overlay').classList.add('opacity-0');
                document.getElementById('modal-content').classList.add('opacity-0', 'translate-y-full', 'md:translate-y-0', 'md:scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    document.body.style.overflow = 'auto';
                }, 400);
            };

            // === SETTINGS ===
            const settingsModal = document.getElementById('settings-modal');
            document.getElementById('settings-btn').onclick = () => {
                document.getElementById('api-key-input').value = apiKey;
                settingsModal.classList.remove('hidden');
                settingsModal.classList.add('flex');
            };
            window.closeSettings = () => {
                settingsModal.classList.add('hidden');
                settingsModal.classList.remove('flex');
            };
            document.getElementById('save-api-key').onclick = () => {
                const newKey = document.getElementById('api-key-input').value.trim();
                if (newKey) {
                    apiKey = newKey;
                    localStorage.setItem('tmdb_api_key', apiKey);
                    closeSettings();
                    updateUI();
                }
            };

            document.getElementById('prev-year').onclick = () => { if (selectedYear > minYear) { selectedYear--; updateUI(); }};
            document.getElementById('next-year').onclick = () => { if (selectedYear < maxYear) { selectedYear++; updateUI(); }};

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (!modal.classList.contains('hidden')) closeModal();
                    if (!settingsModal.classList.contains('hidden')) closeSettings();
                }
            });

            // Lancement
            buildUI();
            updateUI();
        })();
    </script>
</body>
</html>
