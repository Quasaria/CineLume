<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CineLume – Découvrez les sorties cinéma de la semaine avec une interface Aurora élégante.">
    <title>CineLume – L'Éclairage sur le Cinéma</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' },
                        violet: { 500: '#a855f7', 600: '#7c3aed', 900: '#4c1d95' },
                        surface: { 800: '#18181b', 900: '#09090b', 950: '#050505' }
                    },
                    boxShadow: {
                        'glow-cyan': '0 0 20px rgba(34, 211, 238, 0.4)',
                        'glow-violet': '0 0 30px rgba(124, 58, 237, 0.5)',
                    },
                    animation: {
                        'shimmer': 'shimmer 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shimmer: { '0%, 100%': { opacity: 1 }, '50%': { opacity: .3 } }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Fond dynamique avec fondu cinématographique */
        #dynamic-bg {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.2) saturate(1.3);
            transition: background-image 2s ease-in-out;
            transform: scale(1.1);
        }
        #dynamic-bg::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at top right, rgba(124, 58, 237, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at bottom left, rgba(34, 211, 238, 0.1) 0%, transparent 60%);
            z-index: -1;
        }

        /* Glassmorphism Premium */
        .glass-nav {
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Masques de défilement (Scroll Masks) pour les filtres */
        .scroll-mask {
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animation d'apparition des cartes */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card {
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
        }

        /* Transitions Modale (Bottom Sheet Mobile / Scale Desktop) */
        #modal-overlay { transition: opacity 0.4s ease; }
        #modal-content { 
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s ease; 
        }
        
        /* Custom Text Gradient */
        .text-aurora {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(to right, #a855f7, #22d3ee);
        }
    </style>
</head>
<body class="min-h-screen selection:bg-violet-500 selection:text-white pb-10">

    <div id="dynamic-bg"></div>
    <div class="fixed inset-0 bg-gradient-to-b from-transparent via-surface-950/80 to-surface-950 z-[-1]"></div>

    <nav class="fixed top-0 w-full glass-nav z-40 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="location.reload()">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 to-cyan-500 shadow-glow-violet flex items-center justify-center transform group-hover:scale-105 transition-all duration-300">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">Cine<span class="text-aurora">Lume</span></h1>
            </div>
            <button id="settings-btn" class="p-2 rounded-xl hover:bg-white/10 transition-colors" aria-label="Paramètres">
                <svg class="w-6 h-6 text-gray-300 hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-32 px-6">
        
        <div class="mb-10 text-center md:text-left">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight">À l'affiche en <span class="text-aurora">salles.</span></h2>
            <p class="text-gray-400 text-lg md:text-xl font-light" id="date-subtitle">Découvrez les sorties de la semaine.</p>
        </div>

        <div class="glass-panel p-2 rounded-2xl inline-flex flex-col md:flex-row gap-2 mb-10 w-full md:w-auto items-center">
            
            <div class="flex items-center gap-1">
                <button id="prev-year" class="p-2 rounded-lg hover:bg-white/10 text-violet-400 transition-colors" aria-label="Année précédente">◀</button>
                <span id="current-year-display" class="text-white font-bold text-sm w-12 text-center">2026</span>
                <button id="next-year" class="p-2 rounded-lg hover:bg-white/10 text-violet-400 transition-colors" aria-label="Année suivante">▶</button>
            </div>
            
            <div class="hidden md:block w-px bg-white/10 my-2 mx-2 h-8"></div>
            
            <div class="w-full md:w-auto scroll-mask">
                <div class="flex overflow-x-auto no-scrollbar gap-1 p-1 md:max-w-md lg:max-w-2xl" id="months-container"></div>
            </div>
            
            <div class="hidden md:block w-px bg-white/10 my-2 mx-2 h-8"></div>
            
            <div class="w-full md:w-auto">
                <div class="flex overflow-x-auto no-scrollbar gap-2 p-1" id="weeks-container"></div>
            </div>
        </div>

        <div id="loading" class="hidden grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 gap-y-10"></div>
        
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 gap-y-10 perspective-1000"></div>
    </main>

    <div id="movie-modal" class="fixed inset-0 z-50 hidden flex-col justify-end md:justify-center p-0 md:p-6" role="dialog" aria-modal="true">
        
        <div id="modal-overlay" class="absolute inset-0 bg-surface-950/80 backdrop-blur-md opacity-0" onclick="closeModal()"></div>
        
        <div id="modal-content" class="relative w-full max-w-5xl bg-surface-900 rounded-t-3xl md:rounded-3xl overflow-hidden shadow-2xl opacity-0 translate-y-full md:translate-y-0 md:scale-95 flex flex-col max-h-[90vh] md:max-h-[85vh] border border-white/10 mx-auto">
            
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mt-4 mb-2 md:hidden absolute left-1/2 -translate-x-1/2 z-20"></div>

            <div class="relative h-56 md:h-80 w-full shrink-0 bg-gradient-to-br from-violet-900 to-surface-800">
                <img id="modal-backdrop" src="" alt="" class="w-full h-full object-cover opacity-60 md:opacity-100" onerror="this.style.display='none'">
                <div class="absolute inset-0 bg-gradient-to-t from-surface-900 via-surface-900/60 to-transparent"></div>
                <div class="absolute inset-0 bg-gradient-to-r from-surface-900 via-transparent to-transparent hidden md:block"></div>
                
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/40 hover:bg-violet-600 text-white backdrop-blur-md rounded-full w-10 h-10 flex items-center justify-center transition-colors z-10 hidden md:flex" aria-label="Fermer">✕</button>
            </div>
            
            <div class="px-6 md:px-12 pb-10 pt-2 md:pt-0 flex flex-col md:flex-row gap-8 relative -mt-8 md:-mt-32 overflow-y-auto no-scrollbar">
                
                <div class="hidden md:block w-56 shrink-0 rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/10 z-10 bg-surface-800">
                    <img id="modal-poster" src="" alt="Affiche" class="w-full h-full object-cover">
                </div>
                
                <div class="flex flex-col justify-end pt-4 w-full z-10">
                    <div class="flex flex-wrap gap-2 mb-3 items-center">
                        <span id="modal-date" class="bg-violet-500/20 text-violet-300 border border-violet-500/30 px-3 py-1 rounded-full text-xs font-bold tracking-wide uppercase"></span>
                    </div>
                    
                    <h2 id="modal-title" class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight tracking-tight text-white drop-shadow-lg"></h2>
                    
                    <div class="flex items-center gap-4 mb-6">
                        <div class="flex items-center gap-1.5 bg-gradient-to-r from-violet-600/20 to-cyan-500/20 px-4 py-2 rounded-xl border border-white/10">
                            <span class="text-cyan-400 font-bold text-lg">★</span>
                            <span id="modal-rating" class="font-bold text-white text-lg"></span>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-bold text-white mb-2">Synopsis</h3>
                    <p id="modal-overview" class="text-gray-300 text-base md:text-lg leading-relaxed font-light"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" role="dialog" aria-modal="true">
        <div class="absolute inset-0 bg-surface-950/80 backdrop-blur-sm" onclick="closeSettings()"></div>
        <div class="relative bg-surface-900 rounded-3xl p-8 max-w-md w-full border border-violet-500/30 shadow-glow-violet">
            <h3 class="text-2xl font-bold mb-6 text-white">Paramètres</h3>
            <label class="block text-sm text-gray-400 mb-2 font-medium">Clé API TMDB <span class="text-violet-400">(Local)</span></label>
            <input type="text" id="api-key-input" class="w-full bg-surface-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400 transition-colors mb-2" placeholder="Ex: 81f09aab...">
            <p class="text-xs text-gray-500 mb-8">Stockée uniquement dans votre navigateur.</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-5 py-2.5 rounded-xl text-gray-400 hover:text-white transition-colors font-medium">Annuler</button>
                <button id="save-api-key" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-violet-600 to-cyan-500 text-white font-bold hover:shadow-glow-cyan transition-all">Sauvegarder</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== CONFIG & ÉTAT ====================
            const DEFAULT_API_KEY = '81f09aab8379105c078d67759877bc0b';
            const BASE_URL = 'https://api.themoviedb.org/3';
            const IMG_URL = 'https://image.tmdb.org/t/p/w500';
            const BACKDROP_URL = 'https://image.tmdb.org/t/p/w1280';
            const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
            
            let apiKey = localStorage.getItem('tmdb_api_key') || DEFAULT_API_KEY;
            const today = new Date();
            let selectedMonth = today.getMonth();
            let selectedWeek = Math.min(4, Math.ceil(today.getDate() / 7));
            let selectedYear = today.getFullYear();
            const minYear = today.getFullYear() - 1;
            const maxYear = today.getFullYear() + 2;

            // ==================== DOM ELEMENTS ====================
            const gridEl = document.getElementById('movie-grid');
            const loadingEl = document.getElementById('loading');
            const dynamicBg = document.getElementById('dynamic-bg');
            const modal = document.getElementById('movie-modal');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');

            // ==================== LOGIQUE DATES ====================
            function getDatesForWeek(year, monthIndex, weekNumber) {
                const startDay = (weekNumber - 1) * 7 + 1;
                let endDay = weekNumber * 7;
                const lastDayOfMonth = new Date(year, monthIndex + 1, 0).getDate();
                if (weekNumber === 4) endDay = lastDayOfMonth;
                const start = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(startDay).padStart(2, '0')}`;
                const end = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`;
                return { start, end };
            }

            function formatDateFR(dateString) {
                return new Date(dateString).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            }

            // ==================== INTERFACE (UI) ====================
            function buildUI() {
                const mContainer = document.getElementById('months-container');
                mContainer.innerHTML = '';
                months.forEach((month, i) => {
                    const btn = document.createElement('button');
                    btn.className = `px-5 py-2 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap ${i === selectedMonth ? 'bg-gradient-to-r from-violet-600 to-cyan-500 text-white shadow-glow-violet' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                    btn.textContent = month;
                    btn.onclick = () => { selectedMonth = i; selectedWeek = 1; updateUI(); };
                    mContainer.appendChild(btn);
                });

                const wContainer = document.getElementById('weeks-container');
                wContainer.innerHTML = '';
                for (let i = 1; i <= 4; i++) {
                    const btn = document.createElement('button');
                    btn.className = `px-5 py-2 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap ${i === selectedWeek ? 'bg-white text-surface-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                    btn.textContent = `Semaine ${i}`;
                    btn.onclick = () => { selectedWeek = i; updateUI(); };
                    wContainer.appendChild(btn);
                }
            }

            function updateUI() {
                document.getElementById('current-year-display').textContent = selectedYear;
                
                Array.from(document.getElementById('months-container').children).forEach((btn, i) => {
                    btn.className = `px-5 py-2.5 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap ${i === selectedMonth ? 'bg-gradient-to-r from-violet-600 to-cyan-500 text-white shadow-glow-violet' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                });
                Array.from(document.getElementById('weeks-container').children).forEach((btn, i) => {
                    btn.className = `px-5 py-2.5 rounded-xl font-bold transition-all duration-300 text-sm whitespace-nowrap ${i + 1 === selectedWeek ? 'bg-white text-surface-900 shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`;
                });

                const dates = getDatesForWeek(selectedYear, selectedMonth, selectedWeek);
                document.getElementById('date-subtitle').textContent = `Du ${formatDateFR(dates.start)} au ${formatDateFR(dates.end)}`;
                fetchMovies(dates.start, dates.end);
            }

            // ==================== FETCH & RENDER ====================
            function showSkeletons() {
                gridEl.classList.add('hidden');
                loadingEl.innerHTML = '';
                for (let i = 0; i < 10; i++) {
                    loadingEl.innerHTML += `<div class="rounded-2xl bg-surface-800 border border-white/5 aspect-[2/3] animate-shimmer"></div>`;
                }
                loadingEl.classList.remove('hidden');
            }

            async function fetchMovies(startDate, endDate) {
                showSkeletons();
                try {
                    const url = `${BASE_URL}/discover/movie?api_key=${apiKey}&language=fr-FR&region=FR&primary_release_date.gte=${startDate}&primary_release_date.lte=${endDate}&with_release_type=2|3&sort_by=popularity.desc`;
                    const response = await fetch(url);
                    if(!response.ok) throw new Error("Erreur réseau");
                    const data = await response.json();
                    
                    loadingEl.classList.add('hidden');
                    gridEl.classList.remove('hidden');
                    
                    if (data.results && data.results.length > 0) {
                        displayMovies(data.results);
                        if (data.results[0].backdrop_path) {
                            dynamicBg.style.backgroundImage = `url('${BACKDROP_URL}${data.results[0].backdrop_path}')`;
                        }
                    } else {
                        gridEl.innerHTML = `<div class="col-span-full py-16 text-center text-gray-500 text-lg">Aucune sortie majeure pour cette période.</div>`;
                    }
                } catch (error) {
                    loadingEl.classList.add('hidden');
                    gridEl.classList.remove('hidden');
                    gridEl.innerHTML = `<div class="col-span-full py-16 text-center text-red-400">Erreur de chargement. Vérifiez votre clé API.</div>`;
                }
            }

            // --- 3D TILT EFFECT LOGIC ---
            function handleTilt(e, card) {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                // Max rotation 12 degrees
                const rotateX = ((y - centerY) / centerY) * -12; 
                const rotateY = ((x - centerX) / centerX) * 12;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
            }
            function resetTilt(card) {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            }

            function displayMovies(movies) {
                gridEl.innerHTML = '';
                movies.forEach((movie, index) => {
                    if (!movie.poster_path) return;
                    
                    const card = document.createElement('div');
                    card.className = "movie-card group relative rounded-2xl overflow-hidden cursor-pointer bg-surface-800 border border-white/10 aspect-[2/3] shadow-lg";
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    // Attach Tilt Events (Desktop only)
                    if(window.matchMedia("(min-width: 768px)").matches) {
                        card.addEventListener('mousemove', (e) => handleTilt(e, card));
                        card.addEventListener('mouseleave', () => resetTilt(card));
                    }
                    
                    card.onclick = () => openModal(movie);

                    const ratingBadge = movie.vote_average > 0 
                        ? `<div class="absolute top-3 right-3 bg-surface-900/80 backdrop-blur-md border border-white/10 text-white text-xs font-bold px-2 py-1 rounded-lg flex items-center gap-1 z-10 shadow-lg"><span class="text-cyan-400">★</span>${movie.vote_average.toFixed(1)}</div>` 
                        : '';

                    card.innerHTML = `
                        ${ratingBadge}
                        <img src="${IMG_URL}${movie.poster_path}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-surface-950 via-surface-900/50 to-transparent opacity-90 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="absolute inset-0 flex flex-col justify-end p-4 md:p-5">
                            <h3 class="text-white font-extrabold text-lg leading-tight mb-1 group-hover:text-cyan-400 transition-colors">${movie.title}</h3>
                            <p class="text-violet-300 text-xs font-bold uppercase tracking-wider">${formatDateFR(movie.release_date)}</p>
                        </div>
                    `;
                    gridEl.appendChild(card);
                });
            }

            // ==================== MODALE ====================
            function openModal(movie) {
                document.getElementById('modal-title').textContent = movie.title;
                document.getElementById('modal-date').textContent = formatDateFR(movie.release_date);
                document.getElementById('modal-rating').textContent = movie.vote_average > 0 ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('modal-overview').textContent = movie.overview || "Synopsis indisponible pour le moment.";
                document.getElementById('modal-poster').src = `${IMG_URL}${movie.poster_path}`;
                
                const backdrop = document.getElementById('modal-backdrop');
                if (movie.backdrop_path) {
                    backdrop.src = `${BACKDROP_URL}${movie.backdrop_path}`;
                    backdrop.style.display = '';
                } else {
                    backdrop.style.display = 'none';
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        modalOverlay.classList.remove('opacity-0');
                        // Animation d'entrée : supprime les états "hors écran" et "réduits"
                        modalContent.classList.remove('opacity-0', 'translate-y-full', 'md:translate-y-0', 'md:scale-95');
                    });
                });
            }

            window.closeModal = function() {
                modalOverlay.classList.add('opacity-0');
                // Animation de sortie
                modalContent.classList.add('opacity-0', 'translate-y-full', 'md:translate-y-0', 'md:scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    document.body.style.overflow = 'auto';
                }, 400); // Correspond au temps de transition CSS
            };

            // ==================== SETTINGS ====================
            const settingsModal = document.getElementById('settings-modal');
            const apiKeyInput = document.getElementById('api-key-input');

            document.getElementById('settings-btn').onclick = () => {
                apiKeyInput.value = apiKey;
                settingsModal.classList.remove('hidden');
                settingsModal.classList.add('flex');
            };

            window.closeSettings = function() {
                settingsModal.classList.add('hidden');
                settingsModal.classList.remove('flex');
            };

            document.getElementById('save-api-key').onclick = () => {
                const newKey = apiKeyInput.value.trim();
                if (newKey) {
                    apiKey = newKey;
                    localStorage.setItem('tmdb_api_key', apiKey);
                    closeSettings();
                    updateUI();
                }
            };

            // Années
            document.getElementById('prev-year').onclick = () => { if (selectedYear > minYear) { selectedYear--; updateUI(); }};
            document.getElementById('next-year').onclick = () => { if (selectedYear < maxYear) { selectedYear++; updateUI(); }};

            // Echap pour fermer
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (!modal.classList.contains('hidden')) closeModal();
                    if (!settingsModal.classList.contains('hidden')) closeSettings();
                }
            });

            // Initialisation
            buildUI();
            updateUI();
        })();
    </script>
</body>
</html>
